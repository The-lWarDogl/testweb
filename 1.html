        <script>
            (function () {
                const el = document.getElementById('number');
                const fmt = () =>
                new Intl.DateTimeFormat('ru-RU', {
                    timeZone: 'Europe/Moscow',
                    hour: 'numeric',   // без ведущего нуля
                    minute: '2-digit'  // минуты с ведущим нулём
                })
                .format(new Date())
                .replace(/^0/, '')  // убираем ведущий 0 у часов
                .replace(':', '');  // убираем двоеточие

                el.textContent = fmt();        // вставили число, например 851
                // Если нужно автообновление раз в минуту — раскомментируй:
                // setInterval(() => el.textContent = fmt(), 60_000);
            })();
